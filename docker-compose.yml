services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - RAG_SERVICE_URL=http://rag:5000
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      rag:
        condition: service_healthy
    restart: unless-stopped

  rag:
    build:
      context: ./backend/rag
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - rag_chroma:/app/chroma_db
      - uploads_data:/app/uploads
    restart: unless-stopped

volumes:
  rag_chroma:
    name: aistudykit_chroma
  uploads_data:
    name: aistudykit_uploads
